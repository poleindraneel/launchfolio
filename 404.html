<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found</title>
  <style>
    :root { --ink:#0E1428; --accent:#E9A23B; --text:#ECEAE1; --dim:#A7AEC2; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--ink); color:var(--text);
      font-family:ui-monospace,"JetBrains Mono",monospace; display:grid; place-items:center; text-align:center; padding:32px; }
    h1 { font-family:Georgia,serif; font-weight:300; font-size:clamp(56px,16vw,120px); margin:0 0 8px; letter-spacing:-.02em; }
    p { color:var(--dim); font-size:14px; line-height:1.6; margin:0 0 28px; }
    a { display:inline-block; font-size:13px; color:var(--ink); background:var(--accent); padding:12px 22px; border-radius:999px; text-decoration:none; }
    a:hover { filter:brightness(1.06); }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>This page wandered off.</p>
    <a href="/">← Back home</a>
  </div>
</body>
</html>
